# ============================================================
# Git plugins
# ============================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# ============================================================
# borrowed from 'tmux-plugins/tmux-sensible'
# ============================================================
# Upgrade $TERM
set -g default-terminal "screen-256color"
# Focus events enabled for terminals that support them
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# ============================================================
# my settings
# ============================================================
# Mouse support
set -g mouse on

# Windows and panes number from 1
set -g base-index 1
set -g pane-base-index 1

# Longer scrollback buffer
set -g history-limit 1000000

# No escape delay (important for nvim)
set -g escape-time 0

# Reload config with Ctrl+b r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Intuitive split shortcuts
bind | split-window -h
bind - split-window -v

# Vi keys in scroll/copy mode
setw -g mode-keys vi

# OSC52 passthrough — forward to outer terminal (no X11/Wayland in tty sessions)
set -g set-clipboard on

# ============================================================
# Status Bar - Format (global, no inline colors)
# ============================================================
set -g status-interval 1
set -g status-justify centre
set -g status-left-length 30
set -g status-right-length 60

set -g status-left " [#h:#S] "
set -g status-right " #{prefix_highlight} [pane #{pane_index}/#{window_panes}] %a %b %d  %H:%M:%S "
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " ● #I:#W(#{pane_current_command}) "

# Active/inactive window styles (global, fixed - readable on any dark bg)
setw -g window-status-current-style "fg=#ffffff,bg=#3a3a3a,bold"
setw -g window-status-style         "fg=#888888,bg=#2a2a2a"

# ============================================================
# Status Bar - Colors (per session, random theme)
# Themes: bg:fg  — dark background + vivid foreground pairs
# ============================================================
# Applied when config is sourced (initial session)
run-shell 'THEME=$(shuf -n1 -e "1a1a4a:00ffff" "0a4a30:ffff00" "2a5a8a:ffff00" "2a6a4a:ffffff") && BG="#${THEME%%:*}" && FG="#${THEME##*:}" && tmux set -t "$TMUX_PANE" status-style "bg=$BG" && tmux set -t "$TMUX_PANE" status-left-style "fg=$FG,bold" && tmux set -t "$TMUX_PANE" status-right-style "fg=$FG"'

# ============================================================
# Initialize TPM (keep this at the very bottom)
# ============================================================
run '~/.tmux/plugins/tpm/tpm'
